$:
  vscode:
    - services:
        - vscode
        - docker
      runner:
        cpus: 16
      docker:
        image: docker.cnb.cool/arsrna/dev-image/nodejs
      stages:
        - name: 安装依赖
          script: bun i

"**":
  push:
    sync_to_github:
      runner:
        cpus: 2
      services:
        - docker
      stages:
        - name: sync to github
          image: tencentcom/git-sync
          imports:
            - https://cnb.cool/arsrna/env/-/blob/main/git.yaml
          settings:
            target_url: https://github.com/ArSrNa/web-prompter.git
            auth_type: https
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}
            git_email: "root@arsrna.cn"
            force: true

main:
  push:
    build_server:
      services:
        - docker
      stages:
        # - name: CNB推送
        #   script: docker build -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest -f Dockerfile.signaling . --push
        - name: 登录、构建、推送
          imports:
            - https://cnb.cool/arsrna/env/-/blob/main/ccr.yaml
          script:
            - docker login ccr.ccs.tencentyun.com --username=${CCR_UIN} --password=${CCR_PASSWORD}
            - docker build -t ccr.ccs.tencentyun.com/tcb-${CCR_UIN}-iydy/websites:webprompter-signaling -f Dockerfile.signaling . --push

    eo-deploy:
      services:
        - docker
      runner:
        cpus: 32
      docker:
        image: docker.cnb.cool/arsrna/dev-image/nodejs
        volumes:
          - /root/.bun/install/cache
      stages:
        - name: 安装依赖并构建
          script:
            - bun i
            - bun run build
            - echo "构建完成，out/ 目录内容：" && ls -la out/
        - name: 部署到 EdgeOne
          imports:
            - https://cnb.cool/arsrna/env/-/blob/main/tencent.yml
          script:
            # 直接部署 out/ 目录（静态文件，避免 EdgeOne 构建器用 pnpm）
            - bunx edgeone makers deploy -n web-prompter -t $EO_SECRET ./out
